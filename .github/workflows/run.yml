name: Run Python Task Every 90 Minutes

on:
  workflow_dispatch:
  schedule:
    # 每 90 分钟运行一次：
    # 00:00, 01:30, 03:00, 04:30, 06:00, 07:30 ...
    # GitHub Actions 的 schedule 使用 cron。
    - cron: '0 */3 * * *'
    - cron: '30 1-23/3 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        run: python main.py
